<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패 | Executive Signal</title>
  <link rel="stylesheet" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg: #0A0C10;
      --accent: #D4AF37;
      --primary-gradient: linear-gradient(135deg, #D4AF37 0%, #B38F2D 100%);
      --text-dim: #8B949E;
      --card-bg: #161B22;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Pretendard', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo { font-size: 1.4rem; font-weight: 800; margin-bottom: 3rem; }
    .logo span { color: var(--accent); font-style: italic; }
    .card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
    p  { color: var(--text-dim); line-height: 1.7; margin-bottom: 0.75rem; font-size: 0.95rem; }
    .error-code {
      display: inline-block;
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: #ff8080;
      margin: 1rem 0 2rem;
      font-family: monospace;
    }
    .btn-retry {
      display: inline-block;
      background: var(--primary-gradient);
      color: #000;
      font-weight: 700;
      padding: 0.9rem 2.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
    }
    .note { margin-top: 1.5rem; font-size: 0.8rem; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="logo">Executive<span>Signal</span></div>

  <div class="card">
    <div class="icon">⚠️</div>
    <h1>결제가 취소되었습니다</h1>
    <p>결제가 완료되지 않았습니다.<br>아래 오류 코드를 참고하거나, 다시 시도해 주세요.</p>

    <div class="error-code" id="error-code">코드 없음</div>

    <p id="error-msg" style="font-size:0.85rem;"></p>

    <br>
    <a href="/#pricing" class="btn-retry">다시 결제하기</a>
    <p class="note">문의: support@executivesignal.com</p>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get("code") || "UNKNOWN";
    const message = params.get("message") || "결제 중 오류가 발생했습니다.";
    document.getElementById("error-code").textContent = code;
    document.getElementById("error-msg").textContent  = message;
  </script>
</body>
</html>
