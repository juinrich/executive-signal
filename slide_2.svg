<svg width="600" height="380" viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0C10"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B38F2D"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg2)" rx="16"/>

  <!-- Timeline -->
  <line x1="50" y1="190" x2="550" y2="190" stroke="#2a2f3a" stroke-width="2"/>

  <!-- Time markers -->
  <text x="50" y="215" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">00:00</text>
  <text x="150" y="215" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">06:00</text>
  <text x="250" y="215" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">07:32</text>
  <text x="350" y="215" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">08:00</text>
  <text x="450" y="215" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">09:00</text>
  <text x="550" y="215" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">장 개장</text>

  <!-- Tick marks -->
  <line x1="50" y1="185" x2="50" y2="195" stroke="#444" stroke-width="1.5"/>
  <line x1="150" y1="185" x2="150" y2="195" stroke="#444" stroke-width="1.5"/>
  <line x1="250" y1="185" x2="250" y2="195" stroke="#D4AF37" stroke-width="2"/>
  <line x1="350" y1="185" x2="350" y2="195" stroke="#D4AF37" stroke-width="2"/>
  <line x1="450" y1="185" x2="450" y2="195" stroke="#444" stroke-width="1.5"/>
  <line x1="550" y1="185" x2="550" y2="195" stroke="#444" stroke-width="1.5"/>

  <!-- DART Collection node -->
  <circle cx="250" cy="155" r="28" fill="#1a1f28" stroke="#D4AF37" stroke-width="2"/>
  <text x="250" y="150" font-family="Arial" font-size="9" fill="#D4AF37" text-anchor="middle" font-weight="bold">DART</text>
  <text x="250" y="163" font-family="Arial" font-size="9" fill="#D4AF37" text-anchor="middle">수집</text>
  <line x1="250" y1="183" x2="250" y2="127" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="3"/>

  <!-- Email delivery node -->
  <rect x="310" y="125" width="80" height="40" rx="8" fill="#1a3a2a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="350" y="141" font-family="Arial" font-size="9" fill="#2ecc71" text-anchor="middle">📧 리포트</text>
  <text x="350" y="155" font-family="Arial" font-size="9" fill="#2ecc71" text-anchor="middle">발송 완료</text>
  <line x1="350" y1="183" x2="350" y2="165" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="3"/>

  <!-- Arrow -->
  <line x1="278" y1="145" x2="310" y2="145" stroke="#8B949E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Speed badge -->
  <rect x="230" y="55" width="140" height="38" rx="8" fill="#161B22" stroke="rgba(212,175,55,0.3)" stroke-width="1"/>
  <text x="300" y="72" font-family="Arial" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">⚡ 골든타임 배달</text>
  <text x="300" y="86" font-family="Arial" font-size="10" fill="#8B949E" text-anchor="middle">장 개장 1시간 전 수신 완료</text>

  <!-- Process steps at bottom -->
  <rect x="30" y="240" width="120" height="50" rx="8" fill="#161B22" stroke="#2a2f3a" stroke-width="1"/>
  <text x="90" y="260" font-family="Arial" font-size="10" fill="#8B949E" text-anchor="middle">DART 공시</text>
  <text x="90" y="275" font-family="Arial" font-size="10" fill="#8B949E" text-anchor="middle">자동 수집</text>
  <text x="90" y="285" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">전수 모니터링</text>

  <text x="195" y="268" font-family="Arial" font-size="16" fill="#D4AF37" text-anchor="middle">→</text>

  <rect x="220" y="240" width="120" height="50" rx="8" fill="#161B22" stroke="#2a2f3a" stroke-width="1"/>
  <text x="280" y="260" font-family="Arial" font-size="10" fill="#8B949E" text-anchor="middle">AI 필터링</text>
  <text x="280" y="275" font-family="Arial" font-size="10" fill="#8B949E" text-anchor="middle">&amp; 정제</text>
  <text x="280" y="285" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">유의미 신호만 선별</text>

  <text x="385" y="268" font-family="Arial" font-size="16" fill="#D4AF37" text-anchor="middle">→</text>

  <rect x="410" y="240" width="160" height="50" rx="8" fill="#1a3a2a" stroke="rgba(46,204,113,0.4)" stroke-width="1"/>
  <text x="490" y="260" font-family="Arial" font-size="10" fill="#2ecc71" text-anchor="middle">📧 오전 8시</text>
  <text x="490" y="275" font-family="Arial" font-size="10" fill="#2ecc71" text-anchor="middle">리포트 발송</text>
  <text x="490" y="285" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">개장 전 완료</text>
</svg>